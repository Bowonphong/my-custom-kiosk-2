name: "Custom Fullscreen Kiosk"
description: "A custom Kiosk browser built to bypass security and allow USB camera access."
version: "2.0.1"
slug: "custom-kiosk"
init: false
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
startup: application
boot: auto
host_network: true
video: true
apparmor: false
devices:
  - /dev/dri:/dev/dri:rwm
  - /dev/fb0:/dev/fb0:rwm
  - /dev/input:/dev/input:rwm
  - /dev/tty0:/dev/tty0:rwm
  - /dev/tty1:/dev/tty1:rwm
  - /dev/video0:/dev/video0:rwm
options: {}
schema: {}
